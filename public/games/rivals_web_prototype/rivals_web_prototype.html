<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivals Web Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
            display: none;
        }
        
        .crosshair-line { position: absolute; background-color: white; }
        .ch-top { top: 0; left: 9px; width: 2px; height: 8px; }
        .ch-bottom { bottom: 0; left: 9px; width: 2px; height: 8px; }
        .ch-left { top: 9px; left: 0; width: 8px; height: 2px; }
        .ch-right { top: 9px; right: 0; width: 8px; height: 2px; }

        #hud {
            position: absolute; bottom: 20px; right: 30px;
            color: white; font-size: 24px; font-weight: bold; font-style: italic;
            text-align: right; z-index: 5; display: none;
            text-shadow: 2px 2px 0px #000;
        }
        
        #slide-meter-container {
            position: absolute; bottom: 20px; left: 30px; width: 200px; height: 10px;
            background-color: rgba(0,0,0,0.5); border: 2px solid white; z-index: 5; display: none;
        }
        
        #slide-meter { width: 100%; height: 100%; background-color: #00ffcc; transition: width 0.1s; }

        #hit-marker {
            position: absolute; top: 50%; left: 50%; width: 30px; height: 30px;
            transform: translate(-50%, -50%) rotate(45deg); pointer-events: none; z-index: 6;
            opacity: 0; transition: opacity 0.1s;
        }
        .hit-line { position: absolute; background-color: red; }
        .hl-1 { top: 0; left: 14px; width: 2px; height: 10px; }
        .hl-2 { bottom: 0; left: 14px; width: 2px; height: 10px; }
        .hl-3 { top: 14px; left: 0; width: 10px; height: 2px; }
        .hl-4 { top: 14px; right: 0; width: 10px; height: 2px; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="blocker">
        <h1 class="text-5xl font-black mb-4 text-white tracking-widest uppercase">Rivals <span class="text-blue-500">Web</span></h1>
        <p class="text-xl mb-8">Click anywhere to play</p>
        <div class="grid grid-cols-2 gap-x-12 gap-y-4 text-gray-300 text-sm bg-gray-900/50 p-6 rounded-xl border border-gray-700">
            <div><span class="font-bold text-white px-2 py-1 bg-gray-800 rounded mr-2">W A S D</span> Move</div>
            <div><span class="font-bold text-white px-2 py-1 bg-gray-800 rounded mr-2">Click</span> Shoot</div>
            <div><span class="font-bold text-blue-400 px-2 py-1 bg-gray-800 rounded mr-2">W + C</span> Slide (Boost & Duck)</div>
            <div><span class="font-bold text-white px-2 py-1 bg-gray-800 rounded mr-2">1 / 2</span> Switch Weapons</div>
            <div><span class="font-bold text-white px-2 py-1 bg-gray-800 rounded mr-2">Space</span> Jump</div>
            <div><span class="font-bold text-white px-2 py-1 bg-gray-800 rounded mr-2">ESC</span> Pause / Release Mouse</div>
        </div>
    </div>

    <div id="crosshair">
        <div class="crosshair-line ch-top"></div>
        <div class="crosshair-line ch-bottom"></div>
        <div class="crosshair-line ch-left"></div>
        <div class="crosshair-line ch-right"></div>
    </div>

    <div id="hit-marker">
        <div class="hit-line hl-1"></div>
        <div class="hit-line hl-2"></div>
        <div class="hit-line hl-3"></div>
        <div class="hit-line hl-4"></div>
    </div>

    <div id="hud">
        <div id="weapon-name" class="text-3xl text-blue-400">PISTOL</div>
        <div class="text-gray-300 text-lg">Ammo: <span id="ammo-count" class="text-white">15</span>/15</div>
    </div>
    
    <div id="slide-meter-container">
        <div id="slide-meter"></div>
        <div class="text-xs text-white mt-1 uppercase font-bold tracking-wide">Slide Cooldown</div>
    </div>

    <!-- Three.js and PointerLockControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        window.onload = function() {
            // --- SCENE SETUP ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky blue
            scene.fog = new THREE.Fog(0x87ceeb, 0, 750);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // --- LIGHTING ---
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 200, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(-100, 200, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            scene.add(dirLight);

            // --- ENVIRONMENT ---
            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(-Math.PI / 2);
            
            // Grid texture for Roblox feel
            const gridHelper = new THREE.GridHelper(2000, 100, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.receiveShadow = true;
            scene.add(floor);

            // Objects array for collisions/shooting
            const objects = [];
            const targets = [];

            // Add some obstacles
            const boxGeometry = new THREE.BoxGeometry(20, 20, 20);
            const boxMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });
            
            for (let i = 0; i < 20; i++) {
                const box = new THREE.Mesh(boxGeometry, boxMaterial);
                box.position.x = Math.floor(Math.random() * 20 - 10) * 20;
                box.position.y = 10;
                box.position.z = Math.floor(Math.random() * 20 - 10) * 20;
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
                objects.push(box);
            }

            // Add Shootable Targets (Red)
            const targetGeometry = new THREE.CylinderGeometry(5, 5, 20, 32);
            const targetMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x550000 });
            
            for (let i = 0; i < 15; i++) {
                const target = new THREE.Mesh(targetGeometry, targetMaterial);
                target.position.x = Math.floor(Math.random() * 20 - 10) * 15;
                target.position.y = 10;
                target.position.z = Math.floor(Math.random() * 20 - 10) * 15;
                // Don't spawn too close to start
                if(Math.abs(target.position.x) < 40 && Math.abs(target.position.z) < 40) {
                    target.position.x += 50;
                }
                target.castShadow = true;
                target.receiveShadow = true;
                target.isShootable = true;
                scene.add(target);
                objects.push(target);
                targets.push(target);
            }

            // --- WEAPONS SYSTEM ---
            const gunGroup = new THREE.Group();
            camera.add(gunGroup);
            scene.add(camera);

            // 1. Pistol
            const pistolGeo = new THREE.BoxGeometry(1, 1.5, 3);
            const pistolMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const pistol = new THREE.Mesh(pistolGeo, pistolMat);
            pistol.position.set(1.5, -1, -2.5);
            pistol.castShadow = true;
            gunGroup.add(pistol);

            // 2. Rifle
            const rifleGeo = new THREE.BoxGeometry(1.2, 1.8, 8);
            const rifleMat = new THREE.MeshStandardMaterial({ color: 0x1a472a }); // Dark green
            const rifle = new THREE.Mesh(rifleGeo, rifleMat);
            rifle.position.set(1.5, -1.2, -3.5);
            rifle.castShadow = true;
            rifle.visible = false;
            gunGroup.add(rifle);

            // Muzzle Flash
            const flashGeo = new THREE.SphereGeometry(0.8, 8, 8);
            const flashMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });
            const muzzleFlash = new THREE.Mesh(flashGeo, flashMat);
            muzzleFlash.position.set(0, 0, -2);
            muzzleFlash.visible = false;
            pistol.add(muzzleFlash.clone());
            rifle.add(muzzleFlash);

            const weapons = [
                { id: 1, name: "PISTOL", mesh: pistol, ammo: 15, maxAmmo: 15, fireRate: 300, recoil: 0.05, color: "text-blue-400" },
                { id: 2, name: "ASSAULT RIFLE", mesh: rifle, ammo: 30, maxAmmo: 30, fireRate: 100, recoil: 0.02, color: "text-green-400" }
            ];
            let currentWeaponIndex = 0;
            let lastFireTime = 0;

            // --- CONTROLS & PHYSICS ---
            const controls = new THREE.PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const crosshair = document.getElementById('crosshair');
            const hud = document.getElementById('hud');
            const slideMeterContainer = document.getElementById('slide-meter-container');
            const slideMeter = document.getElementById('slide-meter');
            const hitMarker = document.getElementById('hit-marker');

            blocker.addEventListener('click', function () { controls.lock(); });
            controls.addEventListener('lock', function () {
                blocker.style.display = 'none';
                crosshair.style.display = 'block';
                hud.style.display = 'block';
                slideMeterContainer.style.display = 'block';
            });
            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
                crosshair.style.display = 'none';
                hud.style.display = 'none';
                slideMeterContainer.style.display = 'none';
            });

            let moveForward = false;
            let moveBackward = false;
            let moveLeft = false;
            let moveRight = false;
            let canJump = false;

            // Sliding mechanics
            let isSliding = false;
            let slideTimer = 0;
            let slideCooldown = 0;
            const SLIDE_DURATION = 0.6; // seconds
            const SLIDE_COOLDOWN_MAX = 1.5; // seconds
            
            const NORMAL_HEIGHT = 15;
            const CROUCH_HEIGHT = 7;
            let currentHeight = NORMAL_HEIGHT;

            const velocity = new THREE.Vector3();
            const direction = new THREE.Vector3();
            
            const raycaster = new THREE.Raycaster();

            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveForward = true;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveLeft = true;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveBackward = true;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveRight = true;
                        break;
                    case 'Space':
                        if (canJump === true && !isSliding) velocity.y += 150;
                        canJump = false;
                        break;
                    case 'KeyC':
                        // Trigger Slide if moving forward, grounded, and cooldown is ready
                        if (moveForward && canJump && slideCooldown <= 0 && !isSliding) {
                            isSliding = true;
                            slideTimer = SLIDE_DURATION;
                            slideCooldown = SLIDE_COOLDOWN_MAX;
                            // Add slight initial burst
                            velocity.z -= 150; 
                        }
                        break;
                    case 'Digit1':
                        switchWeapon(0);
                        break;
                    case 'Digit2':
                        switchWeapon(1);
                        break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW':
                        moveForward = false;
                        break;
                    case 'ArrowLeft':
                    case 'KeyA':
                        moveLeft = false;
                        break;
                    case 'ArrowDown':
                    case 'KeyS':
                        moveBackward = false;
                        break;
                    case 'ArrowRight':
                    case 'KeyD':
                        moveRight = false;
                        break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            function switchWeapon(index) {
                weapons[currentWeaponIndex].mesh.visible = false;
                currentWeaponIndex = index;
                weapons[currentWeaponIndex].mesh.visible = true;
                
                const weaponData = weapons[currentWeaponIndex];
                document.getElementById('weapon-name').innerText = weaponData.name;
                document.getElementById('weapon-name').className = `text-3xl ${weaponData.color}`;
                document.getElementById('ammo-count').innerText = weaponData.ammo;
            }

            // Shooting logic
            document.addEventListener('mousedown', (event) => {
                if (!controls.isLocked) return;
                if (event.button !== 0) return; // Left click only

                const now = performance.now();
                const weapon = weapons[currentWeaponIndex];

                // Auto/Semi logic based on fire rate
                if (now - lastFireTime < weapon.fireRate) return;
                
                if (weapon.ammo <= 0) {
                    // Auto reload simulation
                    setTimeout(() => { weapon.ammo = weapon.maxAmmo; updateHUD(); }, 1000);
                    return;
                }

                fireWeapon(weapon, now);
            });

            function fireWeapon(weapon, time) {
                weapon.ammo--;
                lastFireTime = time;
                updateHUD();

                // Recoil animation
                weapon.mesh.position.z += weapon.recoil * 10;
                weapon.mesh.rotation.x += weapon.recoil;
                
                // Muzzle flash
                weapon.mesh.children[0].visible = true;
                setTimeout(() => { weapon.mesh.children[0].visible = false; }, 50);

                // Raycast for shooting
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(objects);

                if (intersects.length > 0) {
                    const hitObject = intersects[0].object;
                    
                    if (hitObject.isShootable) {
                        // Show Hit Marker
                        hitMarker.style.opacity = 1;
                        setTimeout(() => { hitMarker.style.opacity = 0; }, 150);

                        // Visual feedback on target
                        hitObject.material.color.setHex(0xffffff);
                        hitObject.scale.multiplyScalar(0.8);

                        // If too small, destroy it and spawn a new one
                        if (hitObject.scale.x < 0.3) {
                            hitObject.position.x = Math.floor(Math.random() * 20 - 10) * 15;
                            hitObject.position.z = Math.floor(Math.random() * 20 - 10) * 15;
                            hitObject.scale.set(1,1,1);
                            hitObject.material.color.setHex(0xff3333);
                        } else {
                            setTimeout(() => { hitObject.material.color.setHex(0xff3333); }, 100);
                        }
                    } else {
                        // Hit wall/floor - spawn small decal/particle (simplified)
                        const decalGeo = new THREE.PlaneGeometry(1, 1);
                        const decalMat = new THREE.MeshBasicMaterial({ color: 0x000000, depthWrite: false });
                        const decal = new THREE.Mesh(decalGeo, decalMat);
                        decal.position.copy(intersects[0].point);
                        decal.position.add(intersects[0].face.normal.clone().multiplyScalar(0.01));
                        // Look away from normal
                        decal.lookAt(intersects[0].point.clone().add(intersects[0].face.normal));
                        scene.add(decal);
                        setTimeout(() => { scene.remove(decal); }, 2000);
                    }
                }
            }

            function updateHUD() {
                document.getElementById('ammo-count').innerText = weapons[currentWeaponIndex].ammo;
            }

            // --- MAIN GAME LOOP ---
            let prevTime = performance.now();
            camera.position.y = NORMAL_HEIGHT;

            function animate() {
                requestAnimationFrame(animate);

                const time = performance.now();

                if (controls.isLocked === true) {
                    const delta = (time - prevTime) / 1000;

                    // Gun recoil recovery
                    const activeWeapon = weapons[currentWeaponIndex].mesh;
                    activeWeapon.position.z = THREE.MathUtils.lerp(activeWeapon.position.z, (currentWeaponIndex===0 ? -2.5 : -3.5), 10 * delta);
                    activeWeapon.rotation.x = THREE.MathUtils.lerp(activeWeapon.rotation.x, 0, 10 * delta);

                    // Physics / Friction
                    velocity.x -= velocity.x * 10.0 * delta;
                    velocity.z -= velocity.z * 10.0 * delta;
                    velocity.y -= 9.8 * 60.0 * delta; // 60 = mass/gravity multiplier

                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveRight) - Number(moveLeft);
                    direction.normalize(); // consistent diagonal movement

                    let currentSpeed = 400.0;

                    // Handle Sliding
                    if (isSliding) {
                        slideTimer -= delta;
                        currentSpeed = 900.0; // High speed boost
                        
                        // Force direction to be mostly forward during slide
                        direction.z = 1; 
                        direction.x = 0; 

                        // Lower camera smoothly
                        currentHeight = THREE.MathUtils.lerp(currentHeight, CROUCH_HEIGHT, 15 * delta);

                        if (slideTimer <= 0) {
                            isSliding = false;
                        }
                    } else {
                        // Return camera to normal height smoothly
                        currentHeight = THREE.MathUtils.lerp(currentHeight, NORMAL_HEIGHT, 10 * delta);
                    }
                    
                    camera.position.y = currentHeight;

                    // Cooldown UI
                    if (slideCooldown > 0) {
                        slideCooldown -= delta;
                        slideMeter.style.width = ((SLIDE_COOLDOWN_MAX - slideCooldown) / SLIDE_COOLDOWN_MAX * 100) + '%';
                        slideMeter.style.backgroundColor = slideCooldown > 0 ? '#ff3333' : '#00ffcc';
                    }

                    if (moveForward || moveBackward) velocity.z -= direction.z * currentSpeed * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * currentSpeed * delta;

                    controls.moveRight(-velocity.x * delta);
                    controls.moveForward(-velocity.z * delta);

                    // Floor Collision
                    if (camera.position.y < currentHeight) {
                        velocity.y = 0;
                        camera.position.y = currentHeight;
                        canJump = true;
                    }
                    
                    // Basic bounding box constraints (Map borders)
                    if (camera.position.x > 900) camera.position.x = 900;
                    if (camera.position.x < -900) camera.position.x = -900;
                    if (camera.position.z > 900) camera.position.z = 900;
                    if (camera.position.z < -900) camera.position.z = -900;
                }

                prevTime = time;
                renderer.render(scene, camera);
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };
    </script>
</body>
</html>
