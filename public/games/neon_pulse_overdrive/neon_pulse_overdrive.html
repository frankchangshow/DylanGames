<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pulse: Overdrive</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --neon-yellow: #fff200;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #020205;
        }

        /* UI Elements */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-left: 4px solid var(--neon-blue);
            backdrop-filter: blur(8px);
            min-width: 120px;
        }

        .health-stats-box {
            flex-grow: 1;
            margin: 0 20px;
            max-width: 400px;
            border-left: 4px solid var(--neon-green);
        }

        .label { font-size: 10px; color: var(--neon-blue); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .value { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px var(--neon-blue); }

        .bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            margin-top: 5px;
            overflow: hidden;
            border-radius: 2px;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease-out, background-color 0.3s;
        }

        #hp-fill-hud {
            background: linear-gradient(90deg, #159957 0%, #155799 100%);
            box-shadow: 0 0 15px var(--neon-green);
        }

        #shield-fill-hud {
            position: absolute;
            top: 0;
            left: 0;
            background: #fff;
            opacity: 0.6;
            width: 0%;
            box-shadow: 0 0 10px #fff;
        }

        #xp-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        #xp-fill {
            width: 0%;
            height: 100%;
            background: var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            transition: width 0.3s ease-out;
        }

        #ability-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .ability-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #fff;
            position: relative;
        }

        .ability-cooldown {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 242, 254, 0.3);
            height: 0%;
        }

        #auto-fire-status {
            font-size: 10px;
            letter-spacing: 1px;
            margin-top: 5px;
            color: var(--neon-green);
        }

        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 20, 0.95);
            border: 2px solid var(--neon-blue);
            padding: 30px;
            text-align: center;
            pointer-events: auto;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2);
            display: none;
            min-width: 320px;
            max-width: 90%;
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .upgrade-card:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--neon-blue);
            transform: translateX(10px);
        }

        .upgrade-title { color: var(--neon-blue); font-weight: bold; font-size: 18px; display: block; }
        .upgrade-desc { color: #aaa; font-size: 14px; margin-top: 4px; display: block;}

        h1 { margin: 0; font-size: 3rem; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px var(--neon-blue); }
        button {
            margin-top: 20px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: #fff;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover { background: var(--neon-blue); color: #000; }

        #announcement {
            position: absolute;
            width: 100%;
            top: 30%;
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 20px;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.8);
            z-index: 50;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
        }

        .boss-warning {
            color: var(--neon-yellow) !important;
            text-shadow: 0 0 20px var(--neon-yellow) !important;
        }

        @keyframes levelUpAnim {
            0% { opacity: 0; transform: scale(0.5); }
            20% { opacity: 1; transform: scale(1.1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <div id="ui-layer">
            <div class="hud-row">
                <div class="stats-box">
                    <div class="label">System Core Score</div>
                    <div class="value" id="score-val">000000</div>
                    <div id="auto-fire-status">AUTO-FIRE: ON</div>
                </div>

                <div class="stats-box health-stats-box">
                    <div class="label" id="hp-label-hud">Integrity: 100%</div>
                    <div class="bar-container">
                        <div id="hp-fill-hud" class="bar-fill"></div>
                        <div id="shield-fill-hud" class="bar-fill"></div>
                    </div>
                </div>

                <div class="stats-box" style="border-left-color: var(--neon-pink);">
                    <div class="label">Iteration</div>
                    <div class="value" id="level-val">1</div>
                </div>
            </div>

            <div id="ability-bar">
                <div class="ability-icon" id="dash-icon">
                    DASH
                    <div class="ability-cooldown" id="dash-cd-fill"></div>
                </div>
            </div>
            
            <div id="xp-bar-container">
                <div id="xp-fill"></div>
            </div>
        </div>

        <div id="announcement">LEVEL UP</div>

        <div id="start-screen" class="modal" style="display: block;">
            <h1>OVERDRIVE</h1>
            <p style="color: var(--neon-blue)">AUGMENT. ADAPT. SURVIVE.</p>
            <button id="start-btn">Initiate Link</button>
            <p style="font-size: 12px; margin-top: 20px; color: #666;">
                WASD: Move | SPACE: Dash | V: Auto-Shoot | MOUSE: Aim
            </p>
        </div>

        <div id="level-up-modal" class="modal">
            <h2 style="color: var(--neon-purple); margin: 0; letter-spacing: 4px;">SYSTEM UPGRADE</h2>
            <p style="font-size: 14px; opacity: 0.8; color: var(--neon-green);">INTEGRITY RESTORED</p>
            <div class="upgrade-grid" id="upgrade-options"></div>
        </div>

        <div id="game-over-modal" class="modal">
            <h1 style="color: var(--neon-pink);">DEFEATED</h1>
            <div class="stats-box" style="margin: 20px 0; border: none; background: none;">
                <div class="label">Final Score</div>
                <div class="value" id="final-score">0</div>
            </div>
            <button onclick="location.reload()">Reset System</button>
        </div>
    </div>

    <script>
        // Color helper - resolving CSS variables for Canvas use
        function varColor(name) { 
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#ffffff'; 
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const levelEl = document.getElementById('level-val');
        const xpFill = document.getElementById('xp-fill');
        const hpFillHud = document.getElementById('hp-fill-hud');
        const shieldFillHud = document.getElementById('shield-fill-hud');
        const hpLabelHud = document.getElementById('hp-label-hud');
        const autoFireEl = document.getElementById('auto-fire-status');
        const levelUpModal = document.getElementById('level-up-modal');
        const upgradeOptions = document.getElementById('upgrade-options');
        const announcement = document.getElementById('announcement');
        const dashCdFill = document.getElementById('dash-cd-fill');

        // Game State
        let state = {
            running: false,
            paused: false,
            score: 0,
            level: 1,
            xp: 0,
            nextLevelXp: 100,
            frameCount: 0,
            shake: 0,
            bossActive: false
        };

        // Player Config
        let player = {
            x: 0,
            y: 0,
            radius: 12,
            hp: 100,
            maxHp: 100,
            speed: 4,
            fireRate: 12, 
            lastShot: 0,
            damage: 1,
            bulletSize: 4,
            multishot: 1, 
            pierce: 1,
            shield: 0,
            maxShield: 5,
            color: '#00f2fe', // Hardcoded hex for reliability
            // Augments
            magnetRange: 150,
            homingStrength: 0,
            regen: 0,
            lifeSteal: 0, 
            healFlash: 0, 
            novaCooldown: 300,
            critChance: 0,
            ricochet: 0,
            // Dash
            dashCooldown: 120,
            dashTimer: 0,
            dashDuration: 10,
            isDashing: false,
            dashInvul: 0,
            // Auto Shoot Features
            autoShoot: true,
            autoAim: false 
        };

        const UPGRADES = [
            { id: 'fire_rate', title: 'Rapid Pulse', desc: '+20% Fire Rate', action: () => player.fireRate = Math.max(3, player.fireRate * 0.8) },
            { id: 'damage', title: 'Power Surge', desc: '+50% Damage', action: () => player.damage += 0.5 },
            { id: 'speed', title: 'Turbo Drive', desc: '+15% Move Speed', action: () => player.speed *= 1.15 },
            { id: 'multishot', title: 'Twin Link', desc: 'Adds extra projectile', action: () => player.multishot++ },
            { id: 'hp_buff', title: 'Hull Fortify', desc: '+25 Max HP', action: () => { player.maxHp += 25; player.hp = player.maxHp; } },
            { id: 'shield', title: 'Aegis', desc: 'Grant 2 Shields (Blocks Hit)', action: () => { player.shield += 2; player.maxShield = Math.max(player.maxShield, player.shield); } },
            { id: 'homing', title: 'Smart Rounds', desc: 'Bullets seek out targets', action: () => player.homingStrength += 0.05 },
            { id: 'magnet', title: 'Void Pull', desc: '+50% Collection Range', action: () => player.magnetRange *= 1.5 },
            { id: 'regen', title: 'Bio-Link', desc: 'Increase passive repair rate', action: () => player.regen += 0.015 },
            { id: 'lifesteal', title: 'Vampiric Link', desc: 'Recover HP on damage dealt', action: () => player.lifeSteal += 0.1 },
            { id: 'crit', title: 'Critical Error', desc: '+15% Chance for 3x Damage', action: () => player.critChance += 0.15 },
            { id: 'ricochet', title: 'Bounce Protocol', desc: 'Bullets bounce off screen edges', action: () => player.ricochet++ },
            { id: 'auto_aim', title: 'Targeting Matrix', desc: 'Auto-fire tracks nearest enemy', action: () => player.autoAim = true }
        ];

        let keys = {};
        let mouse = { x: 0, y: 0, down: false };
        let entities = {
            bullets: [],
            enemies: [],
            particles: [],
            xpGems: [],
            trails: [],
            boss: null
        };

        // Input Setup
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyV' && state.running && !state.paused) {
                player.autoShoot = !player.autoShoot;
                updateAutoFireUI();
            }
            if (e.code === 'Space' && state.running && !state.paused) {
                tryDash();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) mouse.down = true;
            if (e.button === 2) tryDash();
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) mouse.down = false;
        });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('resize', resize);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(!state.running) {
                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
            }
        }

        function tryDash() {
            if (player.dashTimer <= 0) {
                player.isDashing = true;
                player.dashInvul = 15;
                player.dashTimer = player.dashCooldown;
                state.shake = 10;
                createExplosion(player.x, player.y, player.color, 15, 2);
            }
        }

        function updateAutoFireUI() {
            autoFireEl.innerText = `AUTO-FIRE: ${player.autoShoot ? 'ON' : 'OFF'}`;
            autoFireEl.style.color = player.autoShoot ? varColor('--neon-green') : varColor('--neon-pink');
        }

        function updateHUDHealth() {
            const hpPercent = (player.hp / player.maxHp) * 100;
            hpFillHud.style.width = `${hpPercent}%`;
            
            const shieldPercent = player.shield > 0 ? Math.min(100, (player.shield / player.maxShield) * 100) : 0;
            shieldFillHud.style.width = `${shieldPercent}%`;

            hpLabelHud.innerText = `INTEGRITY: ${Math.ceil(hpPercent)}% ${player.shield > 0 ? '[SHIELD ACTIVE]' : ''}`;
            
            if (hpPercent < 30) {
                hpFillHud.style.background = varColor('--neon-red');
                hpLabelHud.style.color = varColor('--neon-red');
            } else {
                hpFillHud.style.background = ''; // Use CSS default
                hpLabelHud.style.color = '';
            }
        }

        function announce(text, isBoss = false) {
            announcement.innerText = text;
            announcement.className = isBoss ? 'boss-warning' : '';
            announcement.style.animation = 'none';
            announcement.offsetHeight;
            announcement.style.animation = 'levelUpAnim 2s forwards';
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            state.running = true;
            resize();
            updateAutoFireUI();
            updateHUDHealth();
            requestAnimationFrame(gameLoop);
        }

        function spawnEnemy(typeOverride = null, xOverride = null, yOverride = null) {
            if (state.paused || state.bossActive) return;
            
            const side = Math.floor(Math.random() * 4);
            let x, y;
            const buffer = 50;
            
            if (xOverride !== null) {
                x = xOverride; y = yOverride;
            } else {
                if(side === 0) { x = Math.random() * canvas.width; y = -buffer; }
                else if(side === 1) { x = canvas.width + buffer; y = Math.random() * canvas.height; }
                else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + buffer; }
                else { x = -buffer; y = Math.random() * canvas.height; }
            }

            const diffFactor = 1 + (state.frameCount / 5000);
            const r = Math.random();
            let type = typeOverride || 'grunt';
            
            if (!typeOverride) {
                if (r > 0.94 - (state.level * 0.01)) type = 'tank';
                else if (r > 0.85 - (state.level * 0.01)) type = 'splitter';
                else if (r > 0.70 - (state.level * 0.015)) type = 'rusher';
            }

            const enemy = {
                x, y,
                type,
                hp: type === 'tank' ? 8 * diffFactor : (type === 'splitter' ? 4 * diffFactor : (type === 'rusher' ? 1.5 : 2.5 * diffFactor)),
                speed: type === 'rusher' ? 4.2 : (type === 'tank' ? 1.5 : (type === 'splitter' ? 2.0 : 2.6)),
                radius: type === 'tank' ? 32 : (type === 'splitter' ? 20 : (type === 'rusher' ? 10 : 14)),
                // Resolve colors at spawn time so they are valid hex strings
                color: type === 'tank' ? varColor('--neon-yellow') : (type === 'splitter' ? varColor('--neon-green') : (type === 'rusher' ? varColor('--neon-pink') : '#ff4d4d')),
                rotation: 0
            };
            entities.enemies.push(enemy);
        }

        function spawnBoss() {
            state.bossActive = true;
            announce("SENTINEL DETECTED", true);
            entities.boss = {
                x: canvas.width / 2,
                y: -100,
                targetY: 150,
                radius: 60,
                hp: 100 * (1 + state.level * 0.5),
                maxHp: 100 * (1 + state.level * 0.5),
                color: varColor('--neon-yellow'),
                phase: 0,
                timer: 0,
                rotation: 0
            };
        }

        function createExplosion(x, y, color, count = 10, size = 3) {
            for (let i = 0; i < count; i++) {
                entities.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    radius: Math.random() * size + 1,
                    alpha: 1,
                    color: color,
                    decay: 0.015 + Math.random() * 0.02
                });
            }
            state.shake = Math.min(25, state.shake + count/2);
        }

        function levelUp() {
            state.paused = true;
            state.level++;
            levelEl.innerText = state.level;
            player.hp = player.maxHp;
            player.healFlash = 1.0; 
            updateHUDHealth();
            
            announce("SYSTEM UPDATED");

            if (state.level % 5 === 0) {
                spawnBoss();
            }
            
            upgradeOptions.innerHTML = '';
            const shuffled = [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            shuffled.forEach(up => {
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.innerHTML = `<span class="upgrade-title">${up.title}</span><span class="upgrade-desc">${up.desc}</span>`;
                card.onclick = () => {
                    up.action();
                    state.paused = false;
                    levelUpModal.style.display = 'none';
                    updateHUDHealth();
                };
                upgradeOptions.appendChild(card);
            });

            levelUpModal.style.display = 'block';
        }

        function getClosestEnemy() {
            let targets = [...entities.enemies];
            if (entities.boss) targets.push(entities.boss);
            if (targets.length === 0) return null;
            
            let closest = null;
            let minDist = Infinity;
            targets.forEach(e => {
                const d = Math.hypot(player.x - e.x, player.y - e.y);
                if (d < minDist) {
                    minDist = d;
                    closest = e;
                }
            });
            return closest;
        }

        function update() {
            if (!state.running || state.paused) return;

            state.frameCount++;

            if (player.dashTimer > 0) player.dashTimer--;
            if (player.dashInvul > 0) player.dashInvul--;
            dashCdFill.style.height = `${(player.dashTimer / player.dashCooldown) * 100}%`;

            if (player.regen > 0 && player.hp < player.maxHp) {
                player.hp += player.regen;
                updateHUDHealth();
            }
            if (player.healFlash > 0) player.healFlash -= 0.02;

            let mx = 0, my = 0;
            if (keys['KeyW'] || keys['ArrowUp']) my -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) my += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) mx += 1;

            let currentSpeed = player.speed;
            if (player.isDashing) {
                currentSpeed *= 3;
                player.dashDuration--;
                if (player.dashDuration <= 0) {
                    player.isDashing = false;
                    player.dashDuration = 10;
                }
            }

            if (mx !== 0 || my !== 0) {
                const mag = Math.sqrt(mx*mx + my*my);
                player.x += (mx / mag) * currentSpeed;
                player.y += (my / mag) * currentSpeed;
                
                if(state.frameCount % (player.isDashing ? 1 : 4) === 0) {
                    entities.trails.push({ 
                        x: player.x, y: player.y, 
                        radius: player.radius, alpha: 0.6, 
                        color: player.isDashing ? '#fff' : player.color 
                    });
                }
            }

            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            if (entities.boss) {
                const b = entities.boss;
                b.rotation += 0.02;
                b.timer++;
                if (b.y < b.targetY) b.y += 2;
                if (b.timer % 60 === 0) {
                    const count = 12;
                    for(let i=0; i<count; i++) {
                        const angle = (i/count) * Math.PI * 2 + (b.timer * 0.01);
                        entities.enemies.push({
                            x: b.x, y: b.y,
                            type: 'projectile',
                            hp: 1, speed: 3, radius: 8,
                            vx: Math.cos(angle) * 4,
                            vy: Math.sin(angle) * 4,
                            color: varColor('--neon-yellow'),
                            rotation: 0
                        });
                    }
                }
            }

            if ((mouse.down || player.autoShoot) && state.frameCount - player.lastShot > player.fireRate) {
                let targetAngle;
                if (player.autoAim && player.autoShoot && !mouse.down) {
                    const closest = getClosestEnemy();
                    targetAngle = closest ? Math.atan2(closest.y - player.y, closest.x - player.x) : Math.atan2(mouse.y - player.y, mouse.x - player.x);
                } else {
                    targetAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                }

                const isCrit = Math.random() < player.critChance;
                
                for(let i=0; i<player.multishot; i++) {
                    const offset = (i - (player.multishot - 1) / 2) * 0.18;
                    entities.bullets.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(targetAngle + offset) * 14,
                        vy: Math.sin(targetAngle + offset) * 14,
                        damage: isCrit ? player.damage * 3 : player.damage,
                        radius: player.bulletSize,
                        isCrit: isCrit,
                        bounces: player.ricochet
                    });
                }
                player.lastShot = state.frameCount;
                state.shake = Math.max(state.shake, 2);
            }

            const spawnRate = Math.max(8, 60 - Math.floor(state.frameCount / 500));
            if (!state.bossActive && state.frameCount % spawnRate === 0) spawnEnemy();

            for (let i = entities.bullets.length - 1; i >= 0; i--) {
                const b = entities.bullets[i];
                b.x += b.vx; b.y += b.vy;

                if (entities.boss) {
                    const bdist = Math.hypot(b.x - entities.boss.x, b.y - entities.boss.y);
                    if (bdist < entities.boss.radius + b.radius) {
                        entities.boss.hp -= b.damage;
                        entities.bullets.splice(i, 1);
                        createExplosion(b.x, b.y, '#fff', 3, 2);
                        if (entities.boss.hp <= 0) {
                            createExplosion(entities.boss.x, entities.boss.y, entities.boss.color, 100, 10);
                            entities.xpGems.push({ x: entities.boss.x, y: entities.boss.y, value: 500 });
                            entities.boss = null;
                            state.bossActive = false;
                            state.score += 5000;
                            announce("SENTINEL DEFEATED");
                        }
                        continue;
                    }
                }

                if (b.bounces > 0) {
                    if (b.x < 0 || b.x > canvas.width) { b.vx *= -1; b.bounces--; }
                    if (b.y < 0 || b.y > canvas.height) { b.vy *= -1; b.bounces--; }
                } else if (b.x < -100 || b.x > canvas.width + 100 || b.y < -100 || b.y > canvas.height + 100) {
                    entities.bullets.splice(i, 1);
                }
            }

            for (let i = entities.enemies.length - 1; i >= 0; i--) {
                const e = entities.enemies[i];
                if (e.vx !== undefined) { e.x += e.vx; e.y += e.vy; } 
                else {
                    const dx = player.x - e.x;
                    const dy = player.y - e.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    e.x += (dx/dist) * e.speed;
                    e.y += (dy/dist) * e.speed;
                }
                e.rotation += 0.05;

                const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    if (player.dashInvul <= 0) {
                        if (player.shield > 0) {
                            player.shield--;
                            createExplosion(player.x, player.y, '#fff', 25, 5);
                            state.shake = 5;
                        } else {
                            player.hp -= 20;
                            state.shake = 20;
                            if (player.hp <= 0) {
                                state.running = false;
                                document.getElementById('game-over-modal').style.display = 'block';
                                document.getElementById('final-score').innerText = state.score;
                            }
                        }
                        updateHUDHealth();
                    }
                    entities.enemies.splice(i, 1);
                    createExplosion(e.x, e.y, e.color, 15);
                    continue;
                }

                for (let j = entities.bullets.length - 1; j >= 0; j--) {
                    const b = entities.bullets[j];
                    const bdist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (bdist < e.radius + b.radius) {
                        e.hp -= b.damage;
                        if (player.lifeSteal > 0 && player.hp < player.maxHp) {
                            player.hp = Math.min(player.maxHp, player.hp + (b.damage * player.lifeSteal));
                            player.healFlash = 0.3;
                            updateHUDHealth();
                        }
                        entities.bullets.splice(j, 1);
                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, e.color, 20);
                            if (e.type === 'splitter') {
                                for(let k=0; k<3; k++) spawnEnemy('grunt', e.x, e.y);
                            }
                            entities.xpGems.push({ x: e.x, y: e.y, value: 30 });
                            entities.enemies.splice(i, 1);
                            state.score += 100;
                            scoreEl.innerText = state.score.toString().padStart(6, '0');
                            break;
                        }
                    }
                }
            }

            for (let i = entities.xpGems.length - 1; i >= 0; i--) {
                const g = entities.xpGems[i];
                const dx = player.x - g.x;
                const dy = player.y - g.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < player.magnetRange) {
                    g.x += (dx/dist) * 12; g.y += (dy/dist) * 12;
                }
                if (dist < player.radius + 15) {
                    state.xp += g.value;
                    if (state.xp >= state.nextLevelXp) {
                        state.xp -= state.nextLevelXp;
                        state.nextLevelXp = Math.floor(state.nextLevelXp * 1.35);
                        levelUp();
                    }
                    xpFill.style.width = `${(state.xp / state.nextLevelXp) * 100}%`;
                    entities.xpGems.splice(i, 1);
                }
            }

            for (let i = entities.particles.length - 1; i >= 0; i--) {
                const p = entities.particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if (p.alpha <= 0) entities.particles.splice(i, 1);
            }
            for (let i = entities.trails.length - 1; i >= 0; i--) {
                entities.trails[i].alpha -= 0.04;
                if(entities.trails[i].alpha <= 0) entities.trails.splice(i, 1);
            }

            if (state.shake > 0) state.shake *= 0.9;
        }

        function draw() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (state.shake > 0.5) {
                ctx.translate((Math.random()-0.5) * state.shake, (Math.random()-0.5) * state.shake);
            }

            const pulse = 1 + Math.sin(state.frameCount * 0.05) * 0.02;
            ctx.strokeStyle = `rgba(0, 242, 254, ${0.03 * pulse})`;
            const step = 60;
            for(let x = (player.x % step); x < canvas.width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y = (player.y % step); y < canvas.height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            if (player.hp < player.maxHp * 0.3) {
                const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.2, canvas.width/2, canvas.height/2, canvas.width*0.8);
                const alpha = 0.2 * (1 + Math.sin(state.frameCount * 0.1));
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, `rgba(255, 0, 0, ${alpha})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            entities.xpGems.forEach(g => {
                ctx.beginPath();
                ctx.arc(g.x, g.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = varColor('--neon-purple');
                ctx.shadowBlur = 10; ctx.shadowColor = varColor('--neon-purple');
                ctx.fill();
            });

            entities.trails.forEach(t => {
                ctx.globalAlpha = t.alpha;
                ctx.strokeStyle = t.color;
                ctx.strokeRect(t.x - t.radius, t.y - t.radius, t.radius*2, t.radius*2);
            });
            ctx.globalAlpha = 1;

            entities.particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            entities.bullets.forEach(b => {
                ctx.fillStyle = b.isCrit ? '#ff0' : '#fff';
                ctx.shadowBlur = b.isCrit ? 15 : 10;
                ctx.shadowColor = b.isCrit ? '#ff0' : player.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
            });

            entities.enemies.forEach(e => {
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.rotation);
                ctx.strokeStyle = e.color; ctx.shadowBlur = 15; ctx.shadowColor = e.color; ctx.lineWidth = 3;
                ctx.beginPath();
                if(e.type === 'tank') { ctx.rect(-e.radius, -e.radius, e.radius*2, e.radius*2); } 
                else if(e.type === 'splitter') {
                    for(let i=0; i<4; i++) {
                        const a = (i/4) * Math.PI * 2;
                        const px = Math.cos(a) * e.radius; const py = Math.sin(a) * e.radius;
                        if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    }
                } else { ctx.moveTo(e.radius, 0); ctx.lineTo(-e.radius, e.radius); ctx.lineTo(-e.radius, -e.radius); }
                ctx.closePath(); ctx.stroke(); ctx.restore();
            });

            if (entities.boss) {
                const b = entities.boss;
                ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rotation);
                ctx.strokeStyle = b.color; ctx.shadowBlur = 30; ctx.shadowColor = b.color; ctx.lineWidth = 5;
                ctx.beginPath();
                for(let i=0; i<8; i++) {
                    const a = (i/8) * Math.PI * 2; const r = i % 2 === 0 ? b.radius : b.radius * 0.6;
                    const px = Math.cos(a) * r; const py = Math.sin(a) * r;
                    if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath(); ctx.stroke(); ctx.restore();
                const bhw = 300;
                ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(b.x - bhw/2, b.y + b.radius + 20, bhw, 6);
                ctx.fillStyle = varColor('--neon-yellow'); ctx.fillRect(b.x - bhw/2, b.y + b.radius + 20, bhw * (b.hp/b.maxHp), 6);
            }

            if(state.running) {
                let displayAngle;
                const closest = getClosestEnemy();
                if (player.autoAim && player.autoShoot && !mouse.down) {
                    displayAngle = closest ? Math.atan2(closest.y - player.y, closest.x - player.x) : Math.atan2(mouse.y - player.y, mouse.x - player.x);
                } else {
                    displayAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                }
                ctx.save(); ctx.translate(player.x, player.y);
                if (player.healFlash > 0) {
                    ctx.beginPath(); ctx.arc(0, 0, player.radius * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(57, 255, 20, ${player.healFlash * 0.4})`; ctx.fill();
                }
                ctx.rotate(displayAngle);
                ctx.strokeStyle = player.healFlash > 0.1 ? varColor('--neon-green') : (player.dashInvul > 0 ? '#fff' : player.color);
                ctx.shadowBlur = 20 + (player.healFlash * 30); ctx.shadowColor = ctx.strokeStyle; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(player.radius * 1.5, 0); ctx.lineTo(-player.radius, player.radius); ctx.lineTo(-player.radius * 0.5, 0); ctx.lineTo(-player.radius, -player.radius);
                ctx.closePath(); ctx.stroke();
                if(player.shield > 0) {
                    ctx.beginPath(); ctx.arc(0, 0, player.radius * 2.2, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.setLineDash([5, 5]); ctx.stroke();
                }
                ctx.restore();
            }
            ctx.restore();
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        document.getElementById('start-btn').onclick = startGame;
        resize();
    </script>
</body>
</html>
