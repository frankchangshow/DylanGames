<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Water Chess</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #0ea5e9, #22c55e);
        color: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
      }

      main {
        width: min(520px, calc(100% - 28px));
        padding: 34px 24px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 9vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: clamp(1.05rem, 4vw, 1.35rem);
        font-weight: 800;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Water Chess</h1>
      <p>This Brayden game slot is ready. Replace this file with the real game when it is finished.</p>
    </main>
  </body>
</html>
