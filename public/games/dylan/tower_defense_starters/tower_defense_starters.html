<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense: Ultimate Starters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background-color: #2d5a27;
            border: 4px solid #3e3e3e;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
            max-height: 70vh;
            cursor: crosshair;
        }
        .ui-panel {
            background: rgba(45, 45, 45, 0.95);
            border-top: 2px solid #555;
            padding: 0.75rem;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .tower-btn {
            transition: all 0.2s;
            position: relative;
        }
        .tower-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }
        .tower-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .tower-btn:hover .tooltip {
            visibility: visible;
        }
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            pointer-events: none;
            display: flex;
            gap: 20px;
            z-index: 50;
        }
        #upgrade-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(30, 30, 30, 0.9);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #555;
            width: 200px;
            display: none;
            z-index: 60;
        }
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            display: none;
            z-index: 100;
            border: 2px solid #ffd700;
        }
        .mode-btn {
            width: 280px;
            padding: 1.5rem;
            margin: 0.5rem;
            border-radius: 1rem;
            font-weight: bold;
            transition: transform 0.2s;
            text-align: left;
        }
        .mode-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay">
        <h1 class="text-4xl font-bold text-white mb-8">Select Game Mode</h1>
        <button onclick="startGame('normal')" class="mode-btn bg-blue-600 text-white">
            <div class="text-xl">Normal Mode</div>
            <div class="text-xs font-normal opacity-80">Start with $600 and 20 lives.</div>
        </button>
        <button onclick="startGame('sandbox')" class="mode-btn bg-yellow-600 text-white">
            <div class="text-xl">Sandbox Mode</div>
            <div class="text-xs font-normal opacity-80">Infinite money and lives. Test everything!</div>
        </button>
        <button onclick="startGame('bossOfDeath')" class="mode-btn bg-red-700 text-white border-2 border-red-400">
            <div class="text-xl">Boss of Death</div>
            <div class="text-xs font-normal opacity-80">$100k gold, 1 life. One MEGA BOSS.</div>
        </button>
    </div>

    <div id="stats">
        <span>💰 <span id="money-display">0</span></span>
        <span>❤️ <span id="lives-display">0</span></span>
        <span>🌊 Wave: <span id="wave-display">0</span></span>
    </div>

    <div id="upgrade-panel">
        <h3 id="up-title" class="font-bold text-lg mb-1">Tower Name</h3>
        <p id="up-stats" class="text-sm text-gray-300 mb-3">Lvl 1 | Dmg: 5</p>
        <button id="btn-upgrade" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2 rounded mb-2">UPGRADE (200)</button>
        <button id="btn-sell" class="w-full bg-red-900 hover:bg-red-800 text-white py-1 rounded text-sm">SELL (50)</button>
        <button id="btn-close-upgrade" class="w-full mt-2 text-xs text-gray-400">Close</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel">
        <button id="btn-dart" class="tower-btn bg-blue-600 text-white p-2 rounded-lg flex flex-col items-center w-20">
            <span class="text-xl">🎯</span>
            <span class="text-xs font-bold">Dart</span>
            <span class="text-[10px]">Cost: 100</span>
            <div class="tooltip">Standard single target</div>
        </button>
        <button id="btn-punch" class="tower-btn bg-red-600 text-white p-2 rounded-lg flex flex-col items-center w-20">
            <span class="text-xl">🥊</span>
            <span class="text-xs font-bold">Puncher</span>
            <span class="text-[10px]">Cost: 150</span>
            <div class="tooltip">Heavy melee AoE</div>
        </button>
        <button id="btn-ice" class="tower-btn bg-cyan-400 text-blue-900 p-2 rounded-lg flex flex-col items-center w-20">
            <span class="text-xl">❄️</span>
            <span class="text-xs font-bold">Ice</span>
            <span class="text-[10px]">Cost: 200</span>
            <div class="tooltip">Slows area enemies</div>
        </button>
        <button id="btn-spike" class="tower-btn bg-gray-600 text-white p-2 rounded-lg flex flex-col items-center w-20">
            <span class="text-xl">⚙️</span>
            <span class="text-xs font-bold">Spike</span>
            <span class="text-[10px]">Cost: 80</span>
            <div class="tooltip">Place ON path!</div>
        </button>
        <button id="btn-bounce" class="tower-btn bg-orange-500 text-white p-2 rounded-lg flex flex-col items-center w-20">
            <span class="text-xl">🏀</span>
            <span class="text-xs font-bold">Bounce</span>
            <span class="text-[10px]">Cost: 250</span>
            <div class="tooltip">Projectiles bounce</div>
        </button>
        <button id="btn-lightning" class="tower-btn bg-purple-600 text-white p-2 rounded-lg flex flex-col items-center w-20">
            <span class="text-xl">⚡</span>
            <span class="text-xs font-bold">Chain</span>
            <span class="text-[10px]">Cost: 350</span>
            <div class="tooltip">Hits multiple targets</div>
        </button>
        <div class="flex items-center ml-4">
            <button id="start-wave" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-lg">
                NEXT WAVE
            </button>
        </div>
    </div>
</div>

<div id="message-box">
    <h2 id="msg-title" class="text-3xl font-bold mb-4">GAME OVER</h2>
    <p id="msg-body" class="mb-6">The base has fallen!</p>
    <button onclick="location.reload()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-full">RESTART</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const moneyDisplay = document.getElementById('money-display');
    const livesDisplay = document.getElementById('lives-display');
    const waveDisplay = document.getElementById('wave-display');
    const messageBox = document.getElementById('message-box');
    const upgradePanel = document.getElementById('upgrade-panel');
    const overlay = document.getElementById('overlay');

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    let money = 0;
    let lives = 0;
    let currentWave = 0;
    let waveInProgress = false;
    let selectedTowerType = null;
    let selectedTowerInstance = null;
    let gameActive = false;
    let gameMode = 'normal';

    const pathPoints = [
        {x: 0, y: 300}, {x: 150, y: 300}, {x: 150, y: 100},
        {x: 400, y: 100}, {x: 400, y: 500}, {x: 650, y: 500},
        {x: 650, y: 250}, {x: 800, y: 250}
    ];

    const towers = [];
    const enemies = [];
    const projectiles = [];

    const towerData = {
        'dart': { cost: 100, range: 120, cooldown: 35, damage: 12, color: '#3b82f6', icon: '🎯', type: 'projectile', name: 'Dart Shooter' },
        'punch': { cost: 150, range: 65, cooldown: 65, damage: 45, color: '#dc2626', icon: '🥊', type: 'melee', name: 'Puncher' },
        'ice': { cost: 200, range: 100, cooldown: 45, damage: 2, color: '#22d3ee', icon: '❄️', type: 'aura', name: 'Ice Freezer' },
        'spike': { cost: 80, range: 30, cooldown: 0, damage: 15, color: '#666', icon: '⚙️', type: 'trap', name: 'Spike Trapper', charges: 10 },
        'bounce': { cost: 250, range: 160, cooldown: 50, damage: 18, color: '#f97316', icon: '🏀', type: 'bounce', name: 'Bounce Shooter' },
        'lightning': { cost: 350, range: 140, cooldown: 70, damage: 25, color: '#9333ea', icon: '⚡', type: 'chain', name: 'Chain Lightning' }
    };

    function startGame(mode) {
        gameMode = mode;
        overlay.style.display = 'none';
        gameActive = true;
        
        if (mode === 'sandbox') {
            money = 999999999999999;
            lives = 999999999999999;
        } else if (mode === 'bossOfDeath') {
            money = 100000;
            lives = 1;
        } else {
            money = 600;
            lives = 20;
        }
        
        updateUI();
        loop();
    }

    function formatNumber(num) {
        if (num > 1e12) return "INF";
        if (num > 1e9) return (num / 1e9).toFixed(1) + "B";
        if (num > 1e6) return (num / 1e6).toFixed(1) + "M";
        return Math.floor(num);
    }

    class Enemy {
        constructor(hp, speed, reward, isBoss = false, name = "Enemy") {
            this.x = pathPoints[0].x;
            this.y = pathPoints[0].y;
            this.hp = hp;
            this.maxHp = hp;
            this.speed = speed;
            this.originalSpeed = speed;
            this.reward = reward;
            this.isBoss = isBoss;
            this.name = name;
            this.pathIndex = 0;
            this.distance = 0;
            this.slowTimer = 0;
            this.radius = isBoss ? 45 : 14;
        }
        update() {
            if (this.slowTimer > 0) {
                this.speed = this.originalSpeed * (this.isBoss ? 0.8 : 0.5);
                this.slowTimer--;
            } else {
                this.speed = this.originalSpeed;
            }
            const target = pathPoints[this.pathIndex + 1];
            if (!target) return true;
            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < this.speed) {
                this.x = target.x;
                this.y = target.y;
                this.pathIndex++;
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
            this.distance += this.speed;
            return false;
        }
        draw() {
            ctx.fillStyle = this.isBoss ? '#1e1b4b' : '#ff4d4d';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            if (this.isBoss) {
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 5;
                ctx.stroke();
                ctx.font = 'bold 30px Arial';
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.fillText('💀', this.x, this.y + 10);
            }
            const barWidth = this.isBoss ? 100 : 30;
            ctx.fillStyle = '#000';
            ctx.fillRect(this.x - barWidth/2, this.y - (this.isBoss ? 60 : 25), barWidth, 6);
            ctx.fillStyle = this.slowTimer > 0 ? '#00f' : '#0f0';
            ctx.fillRect(this.x - barWidth/2, this.y - (this.isBoss ? 60 : 25), (this.hp / this.maxHp) * barWidth, 6);
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type; this.level = 1; this.timer = 0; this.flashRange = 0;
            this.charges = towerData[type].charges || Infinity;
            this.updateStats();
        }
        updateStats() {
            const base = towerData[this.type];
            const scale = 1 + (this.level - 1) * 0.45;
            this.range = base.range * (1 + (this.level-1) * 0.08);
            this.damage = base.damage * scale;
            this.cooldown = Math.max(8, base.cooldown * (1 - (this.level-1) * 0.06));
        }
        update() {
            if (this.type === 'trap') {
                enemies.forEach(e => {
                    if (this.charges > 0 && Math.sqrt((e.x - this.x)**2 + (e.y - this.y)**2) < 25) {
                        e.hp -= this.damage;
                        this.charges--;
                        this.flashRange = 2;
                    }
                });
                return;
            }
            if (this.timer > 0) this.timer--;
            if (this.timer <= 0) {
                const target = this.findTarget();
                if (target) { this.fire(target); this.timer = this.cooldown; }
            }
        }
        findTarget() {
            let bestTarget = null, maxDist = -1;
            for (let e of enemies) {
                const d2 = (e.x - this.x)**2 + (e.y - this.y)**2;
                if (d2 <= this.range * this.range && e.distance > maxDist) { maxDist = e.distance; bestTarget = e; }
            }
            return bestTarget;
        }
        fire(target) {
            switch(this.type) {
                case 'dart': projectiles.push(new Projectile(this.x, this.y, target, 12, this.damage, 'dart')); break;
                case 'bounce': projectiles.push(new Projectile(this.x, this.y, target, 10, this.damage, 'bounce', 3)); break;
                case 'punch': 
                    enemies.forEach(e => { if (Math.sqrt((e.x - this.x)**2 + (e.y - this.y)**2) <= this.range + 10) e.hp -= this.damage; });
                    this.flashRange = 5; break;
                case 'ice':
                    enemies.forEach(e => { if (Math.sqrt((e.x - this.x)**2 + (e.y - this.y)**2) <= this.range) { e.slowTimer = 80; e.hp -= this.damage; } });
                    this.flashRange = 8; break;
                case 'lightning': this.chainLightning(target, 3 + (this.level - 1), []); this.flashRange = 4; break;
            }
        }
        chainLightning(start, count, hitList) {
            if (count <= 0 || !start) return;
            hitList.push(start); start.hp -= this.damage;
            projectiles.push(new LightningEffect(hitList.length > 1 ? hitList[hitList.length-2].x : this.x, 
                                                 hitList.length > 1 ? hitList[hitList.length-2].y : this.y, 
                                                 start.x, start.y));
            let next = null, minDist = 180;
            enemies.forEach(e => {
                if (!hitList.includes(e)) {
                    const d = Math.sqrt((e.x - start.x)**2 + (e.y - start.y)**2);
                    if (d < minDist) { minDist = d; next = e; }
                }
            });
            if (next) this.chainLightning(next, count - 1, hitList);
        }
        draw() {
            if (this.flashRange > 0) {
                ctx.fillStyle = towerData[this.type].color + '44';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.fill();
                this.flashRange--;
            }
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'white'; ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
                ctx.setLineDash([]);
            }
            ctx.fillStyle = '#444';
            if (this.type === 'trap') {
                ctx.font = '20px Arial'; ctx.textAlign = 'center';
                ctx.fillText(towerData.spike.icon, this.x, this.y + 7);
            } else {
                ctx.beginPath(); ctx.roundRect(this.x - 20, this.y - 20, 40, 40, 5); ctx.fill();
                ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white'; ctx.fillText(towerData[this.type].icon, this.x, this.y);
                ctx.font = 'bold 10px Arial'; ctx.fillText('Lv' + this.level, this.x, this.y + 15);
            }
        }
    }

    class Projectile {
        constructor(x, y, target, speed, damage, type, bounces = 0) {
            this.x = x; this.y = y; this.target = target; this.speed = speed;
            this.damage = damage; this.type = type; this.bounces = bounces; this.active = true;
        }
        update() {
            if (!this.target || !enemies.includes(this.target)) { this.active = false; return; }
            const dx = this.target.x - this.x, dy = this.target.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.bounces > 0) {
                    this.bounces--; const oldTarget = this.target; let next = null, minDist = 200;
                    enemies.forEach(e => { if (e !== oldTarget) { const d = Math.sqrt((e.x - this.x)**2 + (e.y - this.y)**2); if (d < minDist) { minDist = d; next = e; } } });
                    if (next) this.target = next; else this.active = false;
                } else this.active = false;
            } else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
        }
        draw() {
            ctx.fillStyle = this.type === 'bounce' ? '#f97316' : 'yellow';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.type === 'bounce' ? 6 : 4, 0, Math.PI * 2); ctx.fill();
        }
    }

    class LightningEffect {
        constructor(x1, y1, x2, y2) { this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2; this.life = 10; }
        update() { this.life--; return this.life > 0; }
        draw() {
            ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 3; ctx.beginPath();
            ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.stroke();
        }
    }

    function spawnWave() {
        if (waveInProgress) return;
        currentWave++; waveInProgress = true; waveDisplay.innerText = currentWave;
        
        if (gameMode === 'bossOfDeath') {
            // Mega Boss Mode: Only 1 Wave with 1 Boss
            setTimeout(() => {
                const megaHp = 1500000; // 1.5 Million HP
                enemies.push(new Enemy(megaHp, 0.5, 0, true, "Death Boss"));
                checkWaveEnd();
            }, 1000);
            return;
        }

        const isBossWave = currentWave % 10 === 0;
        if (isBossWave) {
            let minionsCount = 5, spawned = 0;
            const minionHp = 40 + (currentWave * 20);
            const interval = setInterval(() => {
                enemies.push(new Enemy(minionHp, 1.8, 10));
                if (++spawned >= minionsCount) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const bossHp = (40 + (currentWave * 25)) * 15;
                        enemies.push(new Enemy(bossHp, 0.9, 500 + currentWave * 25, true));
                        checkWaveEnd();
                    }, 2000);
                }
            }, 600);
        } else {
            let count = 5 + currentWave * 3, spawned = 0;
            let hp = 40 + (currentWave * 25), speed = 1.6 + (currentWave * 0.1);
            const interval = setInterval(() => {
                enemies.push(new Enemy(hp, speed, 15 + currentWave));
                if (++spawned >= count) { clearInterval(interval); checkWaveEnd(); }
            }, 700);
        }
    }

    function checkWaveEnd() {
        const check = setInterval(() => {
            if (enemies.length === 0) { 
                waveInProgress = false; 
                if (gameMode !== 'sandbox') money += 150; 
                if (gameMode === 'bossOfDeath') {
                    gameActive = false;
                    document.getElementById('msg-title').innerText = "BOSS DEFEATED!";
                    document.getElementById('msg-body').innerText = "You have conquered the Boss of Death.";
                    messageBox.style.display = 'block';
                }
                updateUI(); 
                clearInterval(check); 
            }
        }, 500);
    }

    function updateUI() {
        moneyDisplay.innerText = formatNumber(money);
        livesDisplay.innerText = formatNumber(lives);
        Object.keys(towerData).forEach(key => {
            document.getElementById(`btn-${key}`).disabled = money < towerData[key].cost;
        });
        if (lives <= 0) gameOver();
        if (selectedTowerInstance) showUpgradePanel(selectedTowerInstance);
    }

    function showUpgradePanel(tower) {
        selectedTowerInstance = tower;
        upgradePanel.style.display = 'block';
        const cost = Math.floor(towerData[tower.type].cost * tower.level * 1.3);
        document.getElementById('up-title').innerText = towerData[tower.type].name;
        document.getElementById('up-stats').innerText = `Level ${tower.level}\nDmg: ${Math.floor(tower.damage)} | Range: ${Math.floor(tower.range)}`;
        const upBtn = document.getElementById('btn-upgrade');
        upBtn.innerText = `UPGRADE (${cost})`;
        upBtn.disabled = money < cost;
        document.getElementById('btn-sell').innerText = `SELL (${Math.floor(towerData[tower.type].cost * 0.6 * tower.level)})`;
    }

    function gameOver() { gameActive = false; messageBox.style.display = 'block'; }

    function drawPath() {
        ctx.strokeStyle = '#5d4e3a'; ctx.lineWidth = 46; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
        for (let i = 1; i < pathPoints.length; i++) ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
        ctx.stroke();
        ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 40; ctx.stroke();
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawPath();
        towers.forEach((t, i) => { 
            t.update(); t.draw(); 
            if (t.type === 'trap' && t.charges <= 0) towers.splice(i, 1);
        });
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if (e.update()) { 
                lives -= (e.isBoss ? 10 : 1); 
                enemies.splice(i, 1); 
                updateUI(); continue; 
            }
            if (e.hp <= 0) { if (gameMode !== 'sandbox') money += e.reward; enemies.splice(i, 1); updateUI(); continue; }
            e.draw();
        }
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            if (p instanceof LightningEffect) { if (!p.update()) projectiles.splice(i, 1); else p.draw(); }
            else { p.update(); if (!p.active) projectiles.splice(i, 1); else p.draw(); }
        }
        if (selectedTowerType) {
            const data = towerData[selectedTowerType];
            const onPath = checkOnPath(mouseX, mouseY);
            const valid = data.type === 'trap' ? onPath : !onPath;
            ctx.fillStyle = valid ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 0, 0, 0.3)';
            ctx.beginPath(); ctx.arc(mouseX, mouseY, data.range, 0, Math.PI * 2); ctx.fill();
        }
        requestAnimationFrame(loop);
    }

    let mouseX = 0, mouseY = 0;
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
    });

    canvas.addEventListener('click', () => {
        if (!gameActive) return;
        const clickedTower = towers.find(t => Math.sqrt((t.x - mouseX)**2 + (t.y - mouseY)**2) < 25);
        if (clickedTower) { showUpgradePanel(clickedTower); selectedTowerType = null; return; }
        if (selectedTowerType) {
            const data = towerData[selectedTowerType];
            const onPath = checkOnPath(mouseX, mouseY);
            const canPlace = data.type === 'trap' ? onPath : !onPath;
            if (canPlace && money >= data.cost) {
                towers.push(new Tower(mouseX, mouseY, selectedTowerType));
                if (gameMode !== 'sandbox') money -= data.cost;
                selectedTowerType = null;
                canvas.style.cursor = 'crosshair';
                updateUI();
            }
        } else { upgradePanel.style.display = 'none'; selectedTowerInstance = null; }
    });

    function checkOnPath(x, y) {
        for (let i = 0; i < pathPoints.length - 1; i++) {
            const l2 = (pathPoints[i].x - pathPoints[i+1].x)**2 + (pathPoints[i].y - pathPoints[i+1].y)**2;
            let t = ((x - pathPoints[i].x) * (pathPoints[i+1].x - pathPoints[i].x) + (y - pathPoints[i].y) * (pathPoints[i+1].y - pathPoints[i].y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const dist = Math.sqrt((x - (pathPoints[i].x + t * (pathPoints[i+1].x - pathPoints[i].x)))**2 + (y - (pathPoints[i].y + t * (pathPoints[i+1].y - pathPoints[i].y)))**2);
            if (dist < 25) return true;
        }
        return false;
    }

    document.getElementById('btn-upgrade').onclick = () => {
        if (!selectedTowerInstance) return;
        const cost = Math.floor(towerData[selectedTowerInstance.type].cost * selectedTowerInstance.level * 1.3);
        if (money >= cost || gameMode === 'sandbox') {
            if (gameMode !== 'sandbox') money -= cost;
            selectedTowerInstance.level++; selectedTowerInstance.updateStats(); updateUI();
        }
    };
    document.getElementById('btn-sell').onclick = () => {
        if (!selectedTowerInstance) return;
        if (gameMode !== 'sandbox') money += Math.floor(towerData[selectedTowerInstance.type].cost * 0.6 * selectedTowerInstance.level);
        towers.splice(towers.indexOf(selectedTowerInstance), 1);
        selectedTowerInstance = null; upgradePanel.style.display = 'none'; updateUI();
    };
    document.getElementById('btn-close-upgrade').onclick = () => { upgradePanel.style.display = 'none'; selectedTowerInstance = null; };
    
    ['dart', 'punch', 'ice', 'spike', 'bounce', 'lightning'].forEach(id => {
        document.getElementById(`btn-${id}`).onclick = (e) => {
            e.stopPropagation(); selectedTowerType = id; canvas.style.cursor = 'none';
            upgradePanel.style.display = 'none'; selectedTowerInstance = null;
        };
    });

    document.getElementById('start-wave').onclick = spawnWave;
</script>
</body>
</html>
